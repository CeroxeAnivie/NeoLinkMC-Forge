name: minimal-verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: forge-v1_21_5
            gradle_task: :forge:v1_21_5:jar
          - label: forge-v26_1_2
            gradle_task: :forge:v26_1_2:jar
    env:
      GRADLE_USER_HOME: ${{ runner.temp }}\neolinkmc-gradle-home
    steps:
      - uses: actions/checkout@v4
        with:
          path: NeoLinkMC-Forge

      - uses: actions/checkout@v4
        with:
          repository: CeroxeAnivie/NeoLinkMC-Common
          path: NeoLinkMC-Common

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Publish shared common artifact
        shell: cmd
        working-directory: NeoLinkMC-Common
        run: gradlew.bat publishLocalDevelopmentPublicationToLocalDevelopmentRepository

      - name: Verify ${{ matrix.label }}
        shell: cmd
        working-directory: NeoLinkMC-Forge
        env:
          GRADLE_TASK: ${{ matrix.gradle_task }}
        run: gradlew.bat -Pneolinkmc_common_repo=../NeoLinkMC-Common/build/repos/local-development %GRADLE_TASK%
