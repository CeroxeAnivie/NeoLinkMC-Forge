plugins {
    id 'base'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '7.0.31' apply false
}

group = property('maven_group')
version = property('mod_version')

def neoLinkApiVersion = property('neolinkapi_version')
def neoLinkMcCommonVersion = property('neolinkmc_common_version')
def neoLinkMcCommonCoordinate = "top.ceroxe.neolinkmc:neolinkmc-common:${neoLinkMcCommonVersion}"
def jetbrainsAnnotationsVersion = '26.0.2'
def requestedTasks = gradle.startParameter.taskNames
def diagnosticRootTasks = [
    'help',
    'tasks',
    'projects',
    'properties',
    'dependencies',
    'dependencyInsight',
    'components',
    'model',
    'wrapper'
] as Set
def isDiagnosticOnlyRequest = !requestedTasks.isEmpty() && requestedTasks.every { taskName ->
    !taskName.contains(':') && diagnosticRootTasks.contains(taskName)
}

