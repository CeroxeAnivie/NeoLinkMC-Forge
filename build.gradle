def shouldConfigureLoaderModule = { String projectPath, String rootPath ->
    if (isDiagnosticOnlyRequest) {
        return false
    }
    if (requestedTasks.isEmpty()) {
        return true
    }
    if (requestedTasks.any { !it.contains(':') }) {
        return true
    }
    if (requestedTasks.every { !it.startsWith("${rootPath}:") }) {
        return false
    }
    def requestedProjectPaths = requestedTasks
        .findAll { it.startsWith("${rootPath}:") }
        .collect { it.split(':').take(3).join(':') }
        .toSet()
    requestedProjectPaths.isEmpty() || requestedProjectPaths.contains(projectPath)
}

String exactMinecraftVersionRange(String version) {
    def parts = version.split('\\.')
    assert parts.length >= 2 : "Unsupported Minecraft version: ${version}"
    def upperBound = parts.length >= 3
        ? ([parts[0], parts[1], Integer.toString(parts[2] as int + 1)]).join('.')
        : "${parts[0]}.${parts[1] as int + 1}"
    "[${version},${upperBound})"
}

String forgeMajorVersionRange(String forgeVersion) {
    def loaderVersion = forgeVersion.substring(forgeVersion.indexOf('-') + 1)
    def majorVersion = loaderVersion.substring(0, loaderVersion.indexOf('.'))
    assert majorVersion.isInteger() : "Unsupported Forge version: ${forgeVersion}"
    "[${majorVersion},)"
}

String mixinCompatibilityLevel(int javaVersion) {
    "JAVA_${javaVersion}"
}

void configureJavaCompilerRelease(Project project, int javaVersion) {
    project.extensions.configure(JavaPluginExtension) { JavaPluginExtension extension ->
        extension.sourceCompatibility = JavaVersion.toVersion(javaVersion)
        extension.targetCompatibility = JavaVersion.toVersion(javaVersion)
        extension.withSourcesJar()
    }
    project.tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.release = javaVersion
    }
}

void addSharedMinecraftTemplate(Project project, String sourceTemplate, String loaderTemplate) {
    def minecraftTemplateDir = rootProject.layout.projectDirectory.dir("minecraftCompat/${sourceTemplate}").asFile
    def loaderTemplateDir = rootProject.layout.projectDirectory.dir(loaderTemplate).asFile
    SourceSetContainer sourceSets = project.extensions.getByType(SourceSetContainer)
    sourceSets.named('main') {
            java.srcDir(new File(minecraftTemplateDir, 'src/main/java'))
            resources.srcDir(new File(minecraftTemplateDir, 'src/main/resources'))
            resources.srcDir(new File(loaderTemplateDir, 'src/main/resources'))
    }
    project.tasks.withType(JavaCompile).configureEach {
        source(new File(loaderTemplateDir, 'src/main/java'))
    }
    project.tasks.withType(ProcessResources).configureEach {
        exclude('fabric.mod.json')
    }
}

void addBundledNeoLinkDependencies(Project project, String bundleConfigurationName, String commonCoordinate, String apiVersion) {
    def bundle = project.configurations.create(bundleConfigurationName) {
        canBeConsumed = false
        canBeResolved = true
        transitive = true
        exclude group: 'com.github.oshi', module: 'oshi-core'
        exclude group: 'net.java.dev.jna', module: 'jna'
        exclude group: 'net.java.dev.jna', module: 'jna-platform'
        exclude group: 'com.google.code.gson', module: 'gson'
        exclude group: 'com.google.guava', module: 'guava'
        exclude group: 'com.google.guava', module: 'failureaccess'
        exclude group: 'org.jline'
        exclude group: 'org.slf4j'
    }

    project.dependencies {
        implementation commonCoordinate
        add(bundle.name, commonCoordinate)
        add(bundle.name, "top.ceroxe.api:neolinkapi-desktop:${apiVersion}") {
            transitive = false
            exclude group: 'org.slf4j', module: 'slf4j-nop'
            exclude group: 'com.google.code.gson', module: 'gson'
        }
    }

    project.tasks.named('jar', Jar).configure {
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        exclude(
            'module-info.class',
            'oshi/**',
            'com/sun/jna/**',
            'com/google/gson/**',
            'com/google/common/**',
            'com/google/errorprone/**',
            'com/google/j2objc/**',
            'org/checkerframework/**',
            'org/jline/**',
            'org/slf4j/**',
            'META-INF/versions/**',
            'META-INF/services/**',
            'META-INF/native-image/**',
            'META-INF/maven/**'
        )
        from({
            bundle.collect { dependency ->
                dependency.directory ? dependency : project.zipTree(dependency)
            }
        })
    }
}

void disableEmptyLoaderTests(Project project) {
    project.tasks.withType(Test).configureEach {
        enabled = false
    }
    project.tasks.withType(JavaCompile).configureEach {
        if (name == 'compileTestJava') {
            enabled = false
        }
    }
}

void configureForgeModule(Project project, Map spec, String commonCoordinate, String apiVersion, String annotationsVersion) {
    project.apply plugin: 'java'
    project.apply plugin: 'net.minecraftforge.gradle'
    project.apply plugin: 'maven-publish'

    project.version = rootProject.version

    configureJavaCompilerRelease(project, spec.javaVersion as int)
    project.tasks.withType(JavaCompile).configureEach {
        options.release = spec.compileRelease as int
    }
    project.configurations.configureEach {
        if (canBeResolved) {
            attributes.attribute(org.gradle.api.attributes.java.TargetJvmVersion.TARGET_JVM_VERSION_ATTRIBUTE, spec.javaVersion as int)
        }
    }

    project.repositories {
        def commonRepoPath = rootProject.providers.gradleProperty('neolinkmc_common_repo').orNull
        if (commonRepoPath) {
            maven {
                url = uri(commonRepoPath)
                content {
                    includeGroup 'top.ceroxe.neolinkmc'
                }
            }
        }
        if (project.providers.gradleProperty('useMavenLocal').map { it.toBoolean() }.orElse(false).get()) {
            mavenLocal()
        }
        project.minecraft.mavenizer(it)
        maven project.fg.forgeMaven
        maven project.fg.minecraftLibsMaven
        mavenCentral()
    }

    addSharedMinecraftTemplate(project, spec.sourceTemplate as String, spec.loaderTemplate as String)
    addBundledNeoLinkDependencies(project, 'forgeBundle', commonCoordinate, apiVersion)
    disableEmptyLoaderTests(project)

    def archivesBaseName = rootProject.property('archives_base_name').toString()
    project.base {
        archivesName = "${archivesBaseName}-Forge-${spec.minecraftVersion}"
    }

    project.minecraft {
        if (!(spec.minecraftVersion as String).startsWith('26.')) {
            mappings channel: 'official', version: spec.minecraftVersion
        }
    }

    project.dependencies {
        implementation project.minecraft.dependency("net.minecraftforge:forge:${spec.forgeVersion}")
        compileOnly "org.jetbrains:annotations:${annotationsVersion}"
    }

    def resourceProperties = [
        version                  : project.version.toString(),
        minecraft_version        : spec.minecraftVersion,
        minecraft_version_range  : exactMinecraftVersionRange(spec.minecraftVersion as String),
        loader_version_range     : "[${(spec.forgeVersion as String).split('-')[1].split('\\.')[0]},)",
        forge_version_range      : spec.forgeVersionRange,
        mixin_compatibility_level: mixinCompatibilityLevel(spec.compileRelease as int)
    ]

    project.tasks.named('processResources', ProcessResources).configure {
        inputs.properties(resourceProperties)
        filesMatching(['META-INF/mods.toml', 'neolinkmc.mixins.json']) {
            expand(resourceProperties)
        }
    }

    project.tasks.named('jar', Jar).configure {
        from(rootProject.file('LICENSE')) {
            rename { "${it}_${archivesBaseName}" }
        }
        manifest.attributes('MixinConfigs': 'neolinkmc.mixins.json')
    }
}

project(':forge') {
    apply plugin: 'base'
}

forgeModules.each { spec ->
    def target = findProject(spec.projectPath)
    if (target && shouldConfigureLoaderModule(target.path, ':forge')) {
        configureForgeModule(target, spec, neoLinkMcCommonCoordinate, neoLinkApiVersion, jetbrainsAnnotationsVersion)
    }
}
